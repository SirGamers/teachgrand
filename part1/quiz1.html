<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quiz 1 - Teaching seniors digital literacy</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
  <h1>First Quiz</h1>
  <form id="quizForm">
    <div class="question">
      <p>1. What does the Right mouse button do? </p>
      <label><input type="radio" name="q0" value="0"> Open the command-menu</label><br>
      <label><input type="radio" name="q0" value="1"> Clicks links.</label><br>
      <label><input type="radio" name="q0" value="2"> Escorts you to Brazil.</label>
    </div>
    <div class="question">
      <p>2. Capital of France?</p>
      <label><input type="radio" name="q1" value="0"> Berlin</label><br>
      <label><input type="radio" name="q1" value="1"> Paris</label><br>
      <label><input type="radio" name="q1" value="2"> Rome</label>
    </div>
    <div class="question">
      <p>3. How do you click on links? </p>
      <label><input type="radio" name="q2" value="0"> Left click.</label><br>
      <label><input type="radio" name="q2" value="1"> Right click.</label><br>
      <label><input type="radio" name="q2" value="2"> The mouse wheel.</label>
    </div>
    <div class="question">
      <p>4. How to scroll on a page?</p>
      <label><input type="radio" name="q3" value="0"> mouse wheel</label><br>
      <label><input type="radio" name="q3" value="1"> left click</label><br>
      <label><input type="radio" name="q3" value="2"> Ctrl+c</label>
    </div>
    <div class="question">
      <p>5. How do you capitalize letters?</p>
      <label><input type="radio" name="q4" value="0"> Shift+ a letter</label><br>
      <label><input type="radio" name="q4" value="1">ctrl+c</label><br>
      <label><input type="radio" name="q4" value="2"> shift+ any number.</label>
    </div>
    <br>
    <button type="button" onclick="submitQuiz()">Submit</button>
  </form>
  <p id="result"></p>
  <!-- check the js file to change where it goes -->
  <button id="nextPage" style="display:none;" onclick="goToNextPage()">"Click" this button to continue</button>
  <script src="../js/quiz1.js"></script>
</body>
</html>
